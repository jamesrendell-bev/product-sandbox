<!-- @startingPoint section="BirdsEyeView" subtitle="LinkedIn carousel — quote frame (1080×1080)" viewport="1080x1080" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@200;300;400;600;700;800&display=swap"/>
<style>html,body{margin:0;background:#04102a}
:root{
  --bev-gradient: linear-gradient(180deg, #000615 0%, #08233f 55%, #164F86 100%);
  --bev-hot-pink: #FF6CAA; --bev-mist-grey:#C6C8CD; --font-brand:"Mulish",system-ui,sans-serif;
}
/* ============================================================
   BirdsEyeView — LinkedIn carousel templates
   Square 1080x1080 frames. Navy canvas, hot-pink accents, the
   hot-pink headline rule, and a subtle triangular-mesh corner
   motif (inspired by competitor geometry, rendered in BEV pink).
   ============================================================ */

.li-frame {
  position: relative;
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: var(--bev-gradient, linear-gradient(180deg, #000615 0%, #08233f 55%, #164F86 100%));
  color: #fff;
  font-family: var(--font-brand, "Mulish", system-ui, sans-serif);
  -webkit-font-smoothing: antialiased;
}
.li-frame * { box-sizing: border-box; }

/* ---- Triangular-mesh corner motif ---- */
.li-mesh {
  position: absolute;
  inset: 0;
  pointer-events: none;
  --mesh-c: rgba(255, 108, 170, 0.19);
  --mesh-g: 80px;
  background-image:
    repeating-linear-gradient(90deg,  transparent 0 calc(var(--mesh-g) - 1px), var(--mesh-c) calc(var(--mesh-g) - 1px) var(--mesh-g)),
    repeating-linear-gradient(30deg,  transparent 0 calc(var(--mesh-g) - 1px), var(--mesh-c) calc(var(--mesh-g) - 1px) var(--mesh-g)),
    repeating-linear-gradient(150deg, transparent 0 calc(var(--mesh-g) - 1px), var(--mesh-c) calc(var(--mesh-g) - 1px) var(--mesh-g));
  -webkit-mask-image: radial-gradient(155% 145% at 100% 0%, #000 0%, rgba(0,0,0,0.62) 40%, transparent 74%);
          mask-image: radial-gradient(155% 145% at 100% 0%, #000 0%, rgba(0,0,0,0.62) 40%, transparent 74%);
}
.li-mesh--bl {
  -webkit-mask-image: radial-gradient(155% 145% at 0% 100%, #000 0%, rgba(0,0,0,0.62) 40%, transparent 74%);
          mask-image: radial-gradient(155% 145% at 0% 100%, #000 0%, rgba(0,0,0,0.62) 40%, transparent 74%);
}
/* a few solid accent triangles tucked into the densest corner */
.li-tris {
  position: absolute;
  top: 84px;
  right: 64px;
  display: flex;
  gap: 14px;
  pointer-events: none;
}
.li-tris i {
  width: 0; height: 0;
  border-top: 17px solid transparent;
  border-bottom: 17px solid transparent;
  border-left: 26px solid var(--bev-hot-pink, #FF6CAA);
  opacity: 0.9;
}
.li-tris i:nth-child(2) { opacity: 0.55; }
.li-tris i:nth-child(3) { opacity: 0.28; }

/* ---- Optional hazard photo / glow layer ---- */
.li-photo {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
}
.li-photo::after {        /* navy protection wash so white type reads */
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, rgba(0,6,21,0.86) 0%, rgba(0,6,21,0.62) 45%, rgba(6,30,58,0.42) 100%);
}
/* a CSS hazard-glow stand-in when no photo is supplied */
.li-glow {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(48% 46% at 82% 78%, rgba(200,37,6,0.40), transparent 70%),
    radial-gradient(40% 40% at 70% 86%, rgba(222,106,16,0.30), transparent 72%),
    radial-gradient(60% 50% at 92% 60%, rgba(255,108,170,0.16), transparent 75%);
}

/* ---- Subtle background-motif library ----
   Decorative texture layers — pick ONE per frame, keep it quiet.
   All sit behind content (z-index 1). On-brand colours only:
   pink, white, sky-blue at low opacity. (No chart reds/oranges in marketing.) */
.bg-motif { position: absolute; inset: 0; pointer-events: none; z-index: 1; }

/* Concentric return-period rings, radiating from a corner */
.bg-rings {
  background-image: repeating-radial-gradient(circle at 100% 100%, transparent 0 92px, rgba(255,108,170,0.13) 92px 94px);
  -webkit-mask-image: radial-gradient(80% 80% at 100% 100%, #000 0%, transparent 70%);
          mask-image: radial-gradient(80% 80% at 100% 100%, #000 0%, transparent 70%);
}
.bg-rings--tl { background-image: repeating-radial-gradient(circle at 0% 0%, transparent 0 92px, rgba(255,108,170,0.12) 92px 94px);
  -webkit-mask-image: radial-gradient(80% 80% at 0% 0%, #000 0%, transparent 70%); mask-image: radial-gradient(80% 80% at 0% 0%, #000 0%, transparent 70%); }

/* Topographic / pressure contours */
.bg-contours {
  background-image: repeating-radial-gradient(ellipse 70% 95% at 16% 26%, transparent 0 54px, rgba(198,200,205,0.07) 54px 56px);
  -webkit-mask-image: radial-gradient(95% 95% at 14% 24%, #000 0%, transparent 74%);
          mask-image: radial-gradient(95% 95% at 14% 24%, #000 0%, transparent 74%);
}

/* Fine coordinate grid, fading across */
.bg-grid {
  background-image:
    linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
  background-size: 72px 72px;
  -webkit-mask-image: linear-gradient(118deg, #000 0%, transparent 62%);
          mask-image: linear-gradient(118deg, #000 0%, transparent 62%);
}

/* Diagonal hairlines from a corner */
.bg-diag {
  background-image: repeating-linear-gradient(135deg, transparent 0 25px, rgba(255,255,255,0.05) 25px 26px);
  -webkit-mask-image: radial-gradient(125% 125% at 100% 100%, #000 0%, transparent 60%);
          mask-image: radial-gradient(125% 125% at 100% 100%, #000 0%, transparent 60%);
}

/* Sky-blue flow / isobar lines drifting up from the base */
.bg-flow {
  background-image: repeating-linear-gradient(100deg, transparent 0 31px, rgba(11,167,252,0.06) 31px 32px);
  -webkit-mask-image: linear-gradient(0deg, #000 0%, transparent 68%);
          mask-image: linear-gradient(0deg, #000 0%, transparent 68%);
}

/* ---- Brand chrome ---- */
.li-logo { position: absolute; top: 64px; left: 72px; height: 56px; width: auto; display: block; z-index: 3; }

/* Partnership lockup (top-right) — official BEV + "developed in partnership with" + ESA,
   baked as one transparent PNG so the wordmark + caption font are always correct. */
.li-lockup-img { position: absolute; top: 54px; right: 72px; width: 212px; height: auto; display: block; z-index: 3; }

.li-url  { position: absolute; bottom: 60px; left: 72px; font-size: 23px; color: var(--bev-mist-grey, #C6C8CD); letter-spacing: 0.01em; z-index: 3; }
/* carousel slide counter (top-LEFT) */
.li-page {
  position: absolute; top: 66px; left: 72px; z-index: 3;
  font-size: 25px; font-weight: 700; letter-spacing: 0.14em;
  color: var(--bev-mist-grey, #C6C8CD); font-variant-numeric: tabular-nums;
}
.li-page b { color: var(--bev-hot-pink, #FF6CAA); font-weight: 800; }
.li-swipe {
  position: absolute; bottom: 56px; right: 72px;
  display: flex; align-items: center; gap: 14px;
  font-size: 23px; color: #fff; z-index: 3;
}
.li-swipe .arr { display: flex; gap: 5px; }
.li-swipe .arr i {
  width: 0; height: 0;
  border-top: 8px solid transparent;
  border-bottom: 8px solid transparent;
  border-left: 12px solid var(--bev-hot-pink, #FF6CAA);
}

/* ---- Type system ---- */
.li-body-wrap { position: absolute; z-index: 3; }
.li-eyebrow {
  font-size: 25px;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--bev-hot-pink, #FF6CAA);
  margin: 0 0 26px;
}
.li-headline {
  font-size: 96px;
  font-weight: 300;
  line-height: 1.02;
  letter-spacing: -0.01em;
  color: #fff;
  margin: 0;
  text-wrap: balance;
}
.li-headline .pink { color: var(--bev-hot-pink, #FF6CAA); }
/* the signature hot-pink headline rule */
.li-rule {
  height: 5px;
  width: 168px;
  background: var(--bev-hot-pink, #FF6CAA);
  border: none;
  margin: 36px 0 0;
}
.li-sub {
  font-size: 40px;
  font-weight: 300;
  line-height: 1.28;
  color: var(--bev-mist-grey, #E7ECF3);
  margin: 36px 0 0;
  max-width: 18ch;
  text-wrap: pretty;
}

/* ---- Numbered zigzag list ---- */
.li-steps { position: absolute; z-index: 3; display: flex; flex-direction: column; }
.li-step { display: grid; align-items: start; column-gap: 30px; }
.li-step__num {
  font-size: 92px; font-weight: 300; line-height: 0.9; color: #fff;
  font-variant-numeric: tabular-nums;
}
.li-step__title { font-size: 38px; font-weight: 600; line-height: 1.12; color: var(--bev-hot-pink, #FF6CAA); margin: 0 0 12px; }
.li-step__body  { font-size: 30px; font-weight: 300; line-height: 1.3; color: var(--bev-mist-grey, #Dfe3ea); margin: 0; }
.li-step__rule  { height: 2px; background: rgba(255,255,255,0.22); align-self: center; }

/* ---- Bracket device + quote ---- */
.li-bracket {
  position: absolute;
  border: 2px solid var(--bev-hot-pink, #FF6CAA);
  border-radius: 30px;
  z-index: 2;
}
.li-quote-mark {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 200px;
  line-height: 0.7;
  color: var(--bev-hot-pink, #FF6CAA);
  height: 110px;
  display: block;
}
.li-quote {
  font-size: 58px; font-weight: 300; line-height: 1.2; color: #fff; margin: 24px 0 0; text-wrap: pretty;
}
.li-quote .pink { color: var(--bev-hot-pink, #FF6CAA); }
.li-attrib { margin-top: 56px; }
.li-attrib__name { font-size: 34px; font-weight: 700; color: var(--bev-hot-pink, #FF6CAA); }
.li-attrib__meta { font-size: 28px; font-weight: 300; color: var(--bev-mist-grey, #C6C8CD); margin-top: 6px; }

/* ---- Big stat ---- */
.li-stat { font-size: 240px; font-weight: 300; line-height: 0.92; color: #fff; letter-spacing: -0.02em; }
.li-stat .unit { color: var(--bev-hot-pink, #FF6CAA); }
