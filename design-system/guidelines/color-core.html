<!-- @dsCard group="Colors" viewport="700x190" name="Core palette" subtitle="Navy canvas, pink for emphasis, white + mist on dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;700&display=swap" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-brand,"Mulish","Helvetica Neue",Arial,sans-serif);background:#fff;padding:22px}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--radius-md,10px);overflow:hidden;border:1px solid var(--hairline-on-light,rgba(0,6,21,.12))}
  .chip{height:74px}
  .meta{padding:9px 11px}
  .name{font-size:13px;font-weight:600;color:var(--bev-navy,#000615);letter-spacing:.01em}
  .hex{font-size:11px;color:var(--text-on-light-soft,#3a414e);font-variant-numeric:tabular-nums;text-transform:uppercase;margin-top:2px}
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#000615"></div><div class="meta"><div class="name">BEV Navy</div><div class="hex">#000615</div></div></div>
    <div class="sw"><div class="chip" style="background:#164F86"></div><div class="meta"><div class="name">BEV Mid</div><div class="hex">#164F86</div></div></div>
    <div class="sw"><div class="chip" style="background:#FF6CAA"></div><div class="meta"><div class="name">Hot Pink</div><div class="hex">#FF6CAA</div></div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">White</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:#C6C8CD"></div><div class="meta"><div class="name">Mist Grey</div><div class="hex">#C6C8CD</div></div></div>
  </div>
</body>
</html>
