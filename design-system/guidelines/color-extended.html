<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;700&display=swap" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-brand,"Mulish",Arial,sans-serif);background:#fff;padding:22px 24px;color:#000615}
  .row{display:flex;gap:10px}
  .sw{flex:1;text-align:center}
  .chip{height:56px;border-radius:8px;border:1px solid rgba(0,6,21,.08)}
  .name{font-size:11px;font-weight:600;margin-top:7px}
  .hex{font-size:10px;color:#3a414e;text-transform:uppercase;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0365C0"></div><div class="name">Blue</div><div class="hex">#0365C0</div></div>
    <div class="sw"><div class="chip" style="background:#00882B"></div><div class="name">Green</div><div class="hex">#00882B</div></div>
    <div class="sw"><div class="chip" style="background:#DCBD23"></div><div class="name">Gold</div><div class="hex">#DCBD23</div></div>
    <div class="sw"><div class="chip" style="background:#DE6A10"></div><div class="name">Orange</div><div class="hex">#DE6A10</div></div>
    <div class="sw"><div class="chip" style="background:#C82506"></div><div class="name">Red</div><div class="hex">#C82506</div></div>
    <div class="sw"><div class="chip" style="background:#773F9B"></div><div class="name">Purple</div><div class="hex">#773F9B</div></div>
  </div>
</body>
</html>
