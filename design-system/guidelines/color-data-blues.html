<!-- @dsCard group="Colors" viewport="700x150" name="Data blues" subtitle="Maps & data overlays only — never body text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;700&display=swap" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-brand,"Mulish",Arial,sans-serif);background:var(--navy-800,#04102a);padding:24px 26px;color:#fff}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.12)}
  .chip{height:60px}
  .meta{padding:8px 11px}
  .name{font-size:12.5px;font-weight:600}
  .hex{font-size:11px;color:#C6C8CD;text-transform:uppercase;margin-top:2px}
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0BA7FC"></div><div class="meta"><div class="name">Sky Blue</div><div class="hex">#0BA7FC</div></div></div>
    <div class="sw"><div class="chip" style="background:#3484C9"></div><div class="meta"><div class="name">Ocean Blue</div><div class="hex">#3484C9</div></div></div>
    <div class="sw"><div class="chip" style="background:#0365C0"></div><div class="meta"><div class="name">Chart Blue</div><div class="hex">#0365C0</div></div></div>
  </div>
</body>
</html>
