<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base — UI rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;700&display=swap" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-brand,"Mulish",Arial,sans-serif);background:#fff;padding:24px 26px;color:#000615}
  .row{display:flex;gap:14px;align-items:flex-end}
  .col{text-align:center}
  .bar{background:#164F86;border-radius:3px;width:34px}
  .n{font-size:11px;font-weight:600;margin-top:7px}
  .v{font-size:10px;color:#5C6677}
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:8px"></div><div class="n">2</div><div class="v">8</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="n">3</div><div class="v">12</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="n">4</div><div class="v">16</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="n">6</div><div class="v">24</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="n">7</div><div class="v">32</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="n">9</div><div class="v">48</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="n">10</div><div class="v">64</div></div>
  </div>
</body>
</html>
