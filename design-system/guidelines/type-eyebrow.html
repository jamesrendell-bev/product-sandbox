<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;700&display=swap" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-brand,"Mulish",Arial,sans-serif);background:var(--navy-800,#04102a);padding:24px 26px;color:#fff;display:flex;gap:34px;align-items:center;flex-wrap:wrap}
  .eb{font-size:13px;font-weight:600;letter-spacing:.16em;text-transform:uppercase}
  .pink{color:#FF6CAA}
  .white{color:#fff}
  .num .s{color:#FF6CAA}
  .tag{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#021a16;background:#FF6CAA;border-radius:4px;padding:4px 9px}
</style>
</head>
<body>
  <div class="eb pink">PRICING</div>
  <div class="eb white num"><span class="s">02</span> &nbsp;/&nbsp; PERIL COVERAGE</div>
  <div class="eb white">THE OPPORTUNITY</div>
  <div class="tag">CONFIDENTIAL</div>
</body>
</html>
