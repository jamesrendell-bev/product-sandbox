<!-- @dsCard group="Type" viewport="700x180" name="Named faces — never the Bold toggle" subtitle="Weight comes from the named face, not faux-bold" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;700&display=swap" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-brand,"Mulish",Arial,sans-serif);background:#fff;padding:22px 26px;color:#000615}
  .stack{display:flex;flex-direction:column;gap:9px}
  .ln{display:flex;align-items:baseline;gap:14px}
  .word{font-size:27px;width:210px}
  .w300{font-weight:300}.w400{font-weight:400}.w600{font-weight:600}.w700{font-weight:700}
  .lbl{font-size:12px;color:#5C6677}
  .lbl b{color:#000615;font-weight:600}
</style>
</head>
<body>
  <div class="stack">
    <div class="ln"><span class="word w300">BirdsEyeView</span><span class="lbl"><b>Ultra Light · 300</b> — display</span></div>
    <div class="ln"><span class="word w400">BirdsEyeView</span><span class="lbl"><b>Regular · 400</b> — body, H1</span></div>
    <div class="ln"><span class="word w600">BirdsEyeView</span><span class="lbl"><b>Demi Bold · 600</b> — sub-heads, eyebrows</span></div>
    <div class="ln"><span class="word w700">BirdsEyeView</span><span class="lbl"><b>Bold · 700</b> — key numbers, table headers</span></div>
  </div>
</body>
</html>
