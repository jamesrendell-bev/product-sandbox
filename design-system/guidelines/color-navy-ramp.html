<!-- @dsCard group="Colors" viewport="700x150" name="Navy gradient & surface ramp" subtitle="The marketing canvas + dark UI surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;700&display=swap" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-brand,"Mulish",Arial,sans-serif);background:#fff;padding:22px 24px;color:#000615}
  .row{display:flex;gap:12px}
  .grad{flex:1.4;border-radius:10px;background:var(--bev-gradient,linear-gradient(180deg,#000615 0%,#08233f 55%,#164F86 100%));height:84px;color:#fff;display:flex;align-items:flex-end;padding:10px 12px;box-sizing:border-box;font-size:11px}
  .ramp{flex:1;display:flex;flex-direction:column;gap:6px}
  .stop{display:flex;align-items:center;gap:8px;font-size:10.5px;color:#3a414e}
  .b{width:30px;height:18px;border-radius:4px;border:1px solid rgba(0,6,21,.1)}
</style>
</head>
<body>
  <div class="row">
    <div class="grad">Canvas gradient · #000615 → #164F86</div>
    <div class="ramp">
      <div class="stop"><span class="b" style="background:#000615"></span> navy-900 · canvas #000615</div>
      <div class="stop"><span class="b" style="background:#04102a"></span> navy-800 · raised #04102a</div>
      <div class="stop"><span class="b" style="background:#09233a"></span> navy-700 · panel #09233a</div>
      <div class="stop"><span class="b" style="background:#0e2c4a"></span> navy-600 · input #0e2c4a</div>
      <div class="stop"><span class="b" style="background:#164F86"></span> navy-500 · mid #164F86</div>
    </div>
  </div>
</body>
</html>
