<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;700&display=swap" />
<style>
  html,body{margin:0}
  body{font-family:var(--font-brand,"Mulish",Arial,sans-serif);background:var(--bev-gradient,linear-gradient(180deg,#000615,#164F86));padding:26px 28px;color:#fff}
  .grid{display:flex;gap:28px;align-items:center}
  .demo{flex:1}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#FF6CAA}
  .head{font-weight:300;font-size:30px;line-height:1.1;margin:10px 0 0}
  .rule{height:3px;width:36%;background:#FF6CAA;margin-top:14px;border-radius:2px}
  .swatch{width:150px;height:118px;border-radius:12px;background:#FF6CAA;display:flex;align-items:flex-end;padding:12px;box-sizing:border-box;box-shadow:var(--glow-pink,0 0 24px -6px rgba(255,108,170,.55))}
  .swatch b{color:#3a0a22;font-size:13px}
  .swatch .h{color:#5e0f36;font-size:11px;text-transform:uppercase}
</style>
</head>
<body>
  <div class="grid">
    <div class="demo">
      <div class="eyebrow">01 / THE OPPORTUNITY</div>
      <div class="head">A navy canvas. Pink for emphasis.</div>
      <div class="rule"></div>
    </div>
    <div class="swatch"><div><b>Hot Pink</b><div class="h">#FF6CAA</div></div></div>
  </div>
</body>
</html>
